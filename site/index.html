<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#fbfaf7">
  <meta name="description" content="每天自动更新的轻量知识应用。">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="styles.css">
  <title>拾光</title>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="./" aria-label="拾光首页">
        <span class="brand-mark"></span>
        <span>拾光</span>
      </a>
      <div class="top-actions">
        <span id="updateStatus" class="update-status">读取中</span>
        <button id="loadMoreButton" class="text-button load-more-top" type="button">加载新知</button>
        <button id="dataButton" class="text-button" type="button">数据</button>
        <button id="installButton" class="text-button" type="button" hidden>安装</button>
      </div>
    </header>

    <nav class="main-tabs" aria-label="查看范围">
      <button class="main-tab active" data-view="discover" type="button">推荐</button>
      <button class="main-tab" data-view="favorites" type="button">
        收藏 <span id="favoriteCount">0</span>
      </button>
      <button class="main-tab" data-view="history" type="button">历史</button>
    </nav>

    <nav id="categoryNav" class="category-nav" aria-label="知识分类"></nav>

    <main>
      <section id="loadingState" class="state-box">正在读取已整理好的知识……</section>

      <section id="emptyState" class="state-box" hidden>
        <div class="empty-symbol">◌</div>
        <h1 id="emptyTitle">这里还没有内容</h1>
        <p id="emptyText">先回到推荐页看看。</p>
      </section>

      <section id="listView" class="collection-view" hidden>
        <header class="collection-head">
          <div>
            <span id="listEyebrow" class="collection-eyebrow">SAVED</span>
            <h1 id="listTitle">我的收藏</h1>
          </div>
          <span id="listCount" class="collection-count">0 条</span>
        </header>
        <div id="listItems" class="collection-list"></div>
      </section>

      <article id="knowledgeView" class="knowledge-view" hidden>
        <button id="backToListButton" class="back-to-list" type="button" hidden>
          ← 返回列表
        </button>

        <div class="meta-row">
          <span id="cardNumber" class="card-number">001</span>
          <div class="meta-pills">
            <span id="categoryLabel">综合</span>
            <span id="dateLabel">已整理</span>
          </div>
        </div>

        <h1 id="cardTitle" class="card-title"></h1>
        <p id="cardLead" class="card-lead"></p>

        <div class="divider"></div>

        <section class="explanation">
          <h2>为什么会这样？</h2>
          <p id="cardExplanation"></p>
        </section>

        <aside class="angle-box">
          <strong>换个角度</strong>
          <p id="cardAngle"></p>
        </aside>

        <section id="moreSection" class="more-section" hidden>
          <div class="more-head">
            <div>
              <span>INTERESTED</span>
              <h2>再多了解一点</h2>
            </div>
            <button id="closeMoreButton" type="button" aria-label="关闭">×</button>
          </div>

          <p id="evidenceText" class="evidence-text"></p>
          <a id="sourceLink" class="source-link" target="_blank" rel="noopener noreferrer">
            查看原始来源 ↗
          </a>
        </section>
      </article>
    </main>

    <div class="bottom-space"></div>
  </div>

  <div id="dock" class="dock">
    <button id="previousButton" class="dock-icon" type="button" aria-label="上一条">←</button>
    <button id="dislikeButton" class="dock-secondary" type="button">不感兴趣</button>
    <button id="interestButton" class="dock-primary" type="button">感兴趣</button>
    <button id="favoriteButton" class="dock-icon" type="button" aria-label="收藏">♡</button>
    <button id="nextButton" class="dock-icon" type="button" aria-label="下一条">→</button>
  </div>

  <dialog id="dataDialog" class="modal">
    <div class="modal-head">
      <div>
        <span>LOCAL RECORDS</span>
        <h2>本机记录</h2>
      </div>
      <button id="closeDataButton" type="button" aria-label="关闭">×</button>
    </div>

    <div class="summary-grid">
      <div><strong id="totalCards">0</strong><span>知识</span></div>
      <div><strong id="totalFavorites">0</strong><span>收藏</span></div>
      <div><strong id="totalHistory">0</strong><span>历史</span></div>
    </div>

    <button id="exportButton" class="modal-action primary" type="button">导出记录备份</button>
    <label class="modal-action file-action">
      导入以前的记录
      <input id="importInput" type="file" accept="application/json">
    </label>
    <button id="restoreButton" class="modal-action" type="button">恢复“不感兴趣”的内容</button>

    <p class="modal-note">
      收藏、历史和不感兴趣记录保存在当前手机或浏览器中。清除浏览器数据前，建议先导出备份。
    </p>

    <section class="trigger-settings">
      <div class="trigger-settings-head">
        <div>
          <span>ON-DEMAND</span>
          <h3>网页按需加载</h3>
        </div>
        <span id="triggerSettingsState" class="trigger-settings-state">未连接</span>
      </div>

      <label class="setting-field">
        <span>加载服务地址</span>
        <input id="triggerEndpointInput" type="url" inputmode="url"
               placeholder="https://你的-worker.workers.dev">
      </label>

      <label class="setting-field">
        <span>个人触发码</span>
        <input id="triggerSecretInput" type="password" autocomplete="off"
               placeholder="只保存在当前设备">
      </label>

      <button id="saveTriggerSettingsButton" class="modal-action primary" type="button">
        保存加载设置
      </button>

      <p class="modal-note">
        这里保存的不是 GitHub 密钥，只是你给加载按钮设置的个人触发码。
        GitHub 令牌和 AI 密钥只保存在云端。
      </p>
    </section>

  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
