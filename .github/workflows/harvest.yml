name: Stock candidate pool

on:
  workflow_dispatch:
  schedule:
    - cron: "11 4,16 * * *"

permissions:
  contents: write

concurrency:
  group: "knowledge-data-files"
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refill raw candidate reserve
        id: harvest
        continue-on-error: true
        env:
          RUN_SOURCE: harvest_schedule
          PIPELINE_MODE: harvest
          HARVEST_TARGET_PENDING: "500"
          HARVEST_REFILL_TRIGGER: "300"
          HARVEST_MAX_PASSES: "4"
          HARVEST_MIN_ADDED: "20"
          MAX_POOL_SIZE: "1000"
          MAX_CARDS_STORED: "2000"
          SEEN_TTL_DAYS: "30"
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python scripts/generate_cards.py

      - name: Upload harvest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harvest-diagnostics
          path: |
            data/harvest_report.json
            site/data/pool_status.json
          if-no-files-found: ignore

      - name: Commit candidate reserve
        if: always()
        run: |
          CHANGED_FILES="data/candidate_pool.json site/data/pool_status.json data/generation_state.json data/harvest_report.json"

          if [ -z "$(git status --porcelain -- $CHANGED_FILES)" ]; then
            echo "Candidate reserve already sufficient."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $CHANGED_FILES
            git commit -m "content: stock candidate pool"
            git push
          fi

      - name: Fail when harvest did not meet success criteria
        if: steps.harvest.outcome != 'success'
        run: exit 1
