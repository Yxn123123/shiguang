name: Update knowledge and publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install generator dependencies
        run: pip install -r requirements.txt

      - name: Generate and review new cards
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.6-luna
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          MAX_NEW_CARDS: "8"
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY has not been configured; publishing the existing cards."
          else
            python scripts/generate_cards.py
          fi

      - name: Commit updated cards
        run: |
          if git diff --quiet -- site/data/cards.json; then
            echo "No card changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site/data/cards.json
            git commit -m "content: add reviewed knowledge cards"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
