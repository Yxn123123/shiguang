name: Generate knowledge

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"
      target_new_cards:
        description: "Optional target number of approved cards"
        required: false
        default: ""
  schedule:
    - cron: "17 23 * * *"

permissions:
  contents: write

concurrency:
  group: "knowledge-data-files"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install generator dependencies
        run: pip install -r requirements.txt

      - name: Replenish candidate and knowledge pools
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: gpt-5.6-luna
          RUN_SOURCE: ${{ github.event.inputs.source || github.event_name }}
          TARGET_NEW_CARDS: ${{ github.event.inputs.target_new_cards }}
          MAX_CANDIDATES_PER_ROUND: "24"
          MAX_PROCESS_ROUNDS: "3"
          MAX_TARGET_NEW_CARDS: "40"
          MAX_POOL_SIZE: "1000"
          MAX_CARDS_STORED: "2000"
          MIN_CANDIDATES_TO_GENERATE: "20"
          PIPELINE_MODE: "generate"
          SEEN_TTL_DAYS: "30"
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY has not been configured."
            exit 1
          fi
          python scripts/generate_cards.py

      - name: Commit pool and knowledge updates
        run: |
          CHANGED_FILES="site/data/cards.json site/data/pool_status.json data/candidate_pool.json data/generation_state.json"

          if [ -z "$(git status --porcelain -- $CHANGED_FILES)" ]; then
            echo "No pool or card changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $CHANGED_FILES
            git commit -m "content: replenish knowledge pool"
            git push
          fi
