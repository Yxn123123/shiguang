name: Stock candidate pool

on:
  workflow_dispatch:
  schedule:
    - cron: "11 4,16 * * *"

permissions:
  contents: write

concurrency:
  group: "candidate-harvest"
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refill raw candidate reserve
        env:
          RUN_SOURCE: harvest_schedule
          PIPELINE_MODE: harvest
          POOL_MIN_PENDING: "160"
          HARVEST_TARGET_PENDING: "200"
          HARVEST_MAX_PASSES: "4"
          MAX_POOL_SIZE: "1000"
          MAX_CARDS_STORED: "2000"
          SEEN_TTL_DAYS: "30"
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python scripts/generate_cards.py

      - name: Commit candidate reserve
        run: |
          CHANGED_FILES="data/candidate_pool.json site/data/pool_status.json data/generation_state.json"

          if [ -z "$(git status --porcelain -- $CHANGED_FILES)" ]; then
            echo "Candidate reserve already sufficient."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $CHANGED_FILES
            git commit -m "content: stock candidate pool"
            git push
          fi
